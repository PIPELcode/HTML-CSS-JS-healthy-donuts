<!DOCTYPE html>

<html lang="en">
    <head>
        <title>Proyecto Integrador Landing Page</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./assets/register.css">
    </head>
    <body>
        <div class="form">
            <h1>REGISTRARSE</h1>
            <form action="./login.html">
                <div class="input-name">
                    <label for="name"></label>
                    <input type="text" id="name" placeholder="NOMBRE" required>
                </div>
                <div class="input-lastname">
                    <label for="name"></label>
                    <input type="text" id="lastname" placeholder="APELLIDO" required>
                </div>
                <div class="input-box">
                    <label for="email"></label>
                    <input type="email" id="email" placeholder="EMAIL" required>
                </div>
                <div class="input-box">
                    <label for="password"></label>
                    <input type="password" id="password" placeholder="CONTRASEÑA" maxlength="8" required>
                </div>
                <div class="input-box">
                    <label for="password"></label>
                    <input type="password" id="password" placeholder="REPITA LA CONTRASEÑA" required maxlength="8">
                </div>
                <input type="submit" value="Registrarse" class="submit">
                </div>
            </form>
        </div>
    </body>
</html>
