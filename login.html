<!DOCTYPE html>

<html lang="en">
    <head>
        <title>Proyecto Integrador Landing Page</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./assets/login.css">
    </head>
    <body>
        <div class="form">
            <h1>LOGIN</h1>
            <form action="./index.html">
                <div class="input-box">
                    <input type="text" id="email" placeholder="INGRESE SU EMAIL" required>
                    <label for="email"></label>
                </div>
                <div class="input-box">
                    <input type="password" id="password" placeholder="INGRESE SU CONTRASEÑA">
                    <label for="password"></label>
                </div>
                <div class="remember">
                    <a href="#">¿Olvido su contraseña?</a>
                </div>
                <input type="submit" value="INICIAR SESIÓN" class="submit">
                <div class="register">
                    <a href="./register.html">¿Aun no se ha registrado?</a>
                </div>
            </form>
        </div>
    </body>
</html>
